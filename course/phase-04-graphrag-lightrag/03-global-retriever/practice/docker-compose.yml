# Neo4j 5.26 LTS + GDS 플러그인 — 4.3 Global Retriever 실습용 compose.
#
# 4.2 와 다른 점이 하나 있다. 4.2 는 엔티티 링킹·이웃·경로가 전부 순수 Cypher 라
# GDS 가 "있으면 좋고 없어도 도는" 선택이었다. 4.3 은 다르다. Leiden 커뮤니티 탐지가
# GDS 프로시저(gds.graph.project / gds.leiden.write)라서 GDS 플러그인이 필수다.
# 그래서 이 compose 는 GDS 플러그인을 반드시 켠 상태로 둔다.
#
# 4.1/4.2 에서 띄운 kb-neo4j 컨테이너에 이미 GDS 가 켜져 있다면(위 두 토픽도 GDS 를
# 켜 둔다) 새로 띄울 필요 없이 그대로 재사용하면 된다. 이 파일은 4.3 만 단독으로
# 실습할 때를 위한 사본이다.
#
# 전제:
#   - Docker / Docker Compose 설치
#   - 포트 7474(HTTP), 7687(Bolt) 가 비어 있어야 함
#
# 실행:
#   docker compose up -d
#   docker compose logs -f neo4j     # "Started." 로그 확인
#
# GDS 설치 확인(컨테이너 기동 뒤):
#   docker exec kb-neo4j cypher-shell -u neo4j -p testpassword1 \
#     "RETURN gds.version() AS gds"
#
# 접속:
#   Browser : http://localhost:7474  (계정 neo4j / testpassword1)
#   Driver  : bolt://localhost:7687
#
# 종료:
#   docker compose down              # 컨테이너만 제거(볼륨 neo4j_data 는 유지)
#   docker compose down -v           # 데이터까지 완전 삭제(주의)

services:
  neo4j:
    image: neo4j:5.26                 # 5.26 LTS. 2025+ CalVer(예: 2025.05)로 올려도 동작
    container_name: kb-neo4j
    ports:
      - "7474:7474"                   # HTTP — Neo4j Browser(웹 UI)
      - "7687:7687"                   # Bolt — Python Driver 가 붙는 프로토콜
    environment:
      # 초기 계정/비밀번호. 미리 지정하면 첫 로그인 강제 변경 화면을 건너뛴다.
      - NEO4J_AUTH=neo4j/testpassword1
      # GDS 플러그인 — 4.3 은 Leiden 커뮤니티 탐지에 GDS 가 필수다(선택 아님).
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
    volumes:
      - neo4j_data:/data              # 볼륨 없으면 컨테이너 제거 시 데이터 증발
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p testpassword1 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
