# competency_questions.yaml — 능력 질문(Competency Question, CQ) 세트.
#
# CQ = "이 그래프가 답할 수 있어야 하는 질문". 스키마를 역설계하는 출발점이다.
# 질문이 스키마를 결정한다 — 빠진 node_type/relation_type 이 있으면 그 CQ 는 답이 안 된다.
#
# 출처: Phase 1/06 golden_questions.yaml 에서 파생했다. 같은 코퍼스(8문서) · 같은 source_id 를
#       유지해 Phase 1 기준선과의 A/B 비교 일관성을 지킨다. 특히 multi-hop 질문이
#       "그래프가 답해야 하는데 Vector-only 로는 약한" CQ 의 핵심 시드다.
#
# 각 CQ 필드:
#   id              : 안정 식별자.
#   question        : 자연어 질문(= 그래프가 답해야 할 것).
#   type            : single-hop | multi-hop.
#   source_gq       : 파생 원본 골든 질문 id(추적용).
#   node_types      : 이 질문에 답하려면 그래프에 있어야 할 노드 타입들.
#   relation_types  : 이 질문에 답하려면 그래프에 있어야 할 관계 타입들.
#                     (없어도 되는 single-hop 은 빈 목록 가능 — 노드 속성만으로 답할 때.)
#   answer_shape    : 기대하는 답의 형태(엔티티 1개 / 엔티티 목록 / 경로 / 수치+근거).
#
# validate_schema.py 가 node_types/relation_types 를 graph_schema.py 의 enum 과 대조해
# 커버리지를 채점한다. enum 에 없는 타입을 적으면 그 CQ 는 reject 된다(품질 게이트 직관).

questions:
  # ── single-hop: 한 문서/한 노드 이웃이면 답이 되는 질문 ──────────────────────
  - id: cq01
    question: "기본 RAG 파이프라인은 어떤 단계로 동작하나?"
    type: single-hop
    source_gq: gq01
    node_types: ["Model", "Concept"]
    relation_types: ["USES"]
    answer_shape: "엔티티 목록(단계 개념들)"

  - id: cq02
    question: "Self-RAG 는 어떤 기법으로 검색 품질을 보정하나?"
    type: single-hop
    source_gq: gq02
    node_types: ["Model", "Method"]
    relation_types: ["USES"]
    answer_shape: "Method 엔티티"

  - id: cq03
    question: "CRAG 의 corrective 검색 평가는 무엇을 쓰나?"
    type: single-hop
    source_gq: gq03
    node_types: ["Model", "Method"]
    relation_types: ["USES"]
    answer_shape: "Method 엔티티"

  - id: cq04
    question: "Microsoft GraphRAG 는 누가 제안했나?"
    type: single-hop
    source_gq: gq04
    node_types: ["Model", "Organization", "Paper"]
    relation_types: ["PROPOSES"]
    answer_shape: "Organization 엔티티"

  - id: cq05
    question: "LightRAG 의 다섯 가지 쿼리 모드는 무엇인가?"
    type: single-hop
    source_gq: gq05
    node_types: ["Model", "Concept"]
    relation_types: []
    answer_shape: "Concept 목록(노드 속성/이웃)"

  - id: cq06
    question: "Neo4j 의 속성 그래프 모델은 무엇을 저장하나?"
    type: single-hop
    source_gq: gq06
    node_types: ["Tool", "Concept"]
    relation_types: []
    answer_shape: "Concept 목록"

  - id: cq07
    question: "임베딩은 텍스트를 무엇으로 바꾸나?"
    type: single-hop
    source_gq: gq07
    node_types: ["Concept"]
    relation_types: []
    answer_shape: "Concept 엔티티(벡터)"

  # ── multi-hop: 둘 이상 노드/문서를 이어야 답이 되는 질문. 그래프의 진짜 값어치. ──
  - id: cq08
    question: "Self-RAG 와 CRAG 는 검색 품질 문제를 각각 어떤 기법으로 보정하며, 둘은 어떻게 비교되나?"
    type: multi-hop
    source_gq: gq08
    node_types: ["Model", "Method"]
    relation_types: ["USES", "COMPARES_TO"]
    answer_shape: "두 Model 의 Method 비교(경로)"

  - id: cq09
    question: "GraphRAG 의 전역 요약 기법은 멀티홉 질의 처리 개념과 어떻게 연결되나?"
    type: multi-hop
    source_gq: gq09
    node_types: ["Model", "Method", "Concept"]
    relation_types: ["USES", "IMPROVES"]
    answer_shape: "Method-Concept 연결 경로"

  - id: cq10
    question: "임베딩 기반 벡터 검색과 그래프 기반 멀티홉 검색은 어떤 개념으로 서로 보완되나?"
    type: multi-hop
    source_gq: gq10
    node_types: ["Concept", "Method"]
    relation_types: ["IMPROVES", "USES"]
    answer_shape: "Concept-Method 보완 경로"

  - id: cq11
    question: "LightRAG 가 Microsoft GraphRAG 대비 토큰 비용을 얼마나 줄였고, 그 근거는 어느 문서인가?"
    type: multi-hop
    source_gq: gq09
    node_types: ["Model"]
    relation_types: ["COMPARES_TO"]
    answer_shape: "수치+근거(Claim 노드)"

  - id: cq12
    question: "RAG 를 개선한 후속 기법들은 무엇이며, 각각 어떤 데이터셋/지표로 평가됐나?"
    type: multi-hop
    source_gq: gq01
    node_types: ["Model", "Dataset", "Metric"]
    relation_types: ["IMPROVES", "EVALUATED_ON", "MEASURED_BY"]
    answer_shape: "Model 목록 + 평가 경로"
